upstream campus_eats_backend {
    least_conn;
    server backend-1:5000 max_fails=3 fail_timeout=15s;
    server backend-2:5000 max_fails=3 fail_timeout=15s;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_pass http://campus_eats_backend;
        proxy_read_timeout 300s;
    }

    location / {
        return 200 "Campus Eats API gateway is running\n";
        add_header Content-Type text/plain;
    }
}
