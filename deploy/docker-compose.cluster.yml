services:
  backend-1:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env
    environment:
      NODE_ENV: production
      MONGOOSE_AUTO_INDEX: "false"
    restart: unless-stopped

  backend-2:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env
    environment:
      NODE_ENV: production
      MONGOOSE_AUTO_INDEX: "false"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend-1
      - backend-2
    ports:
      - "8080:80"
    volumes:
      - ./nginx/campus-eats.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
